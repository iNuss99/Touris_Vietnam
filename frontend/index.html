<body class="bg-luxury-dark text-slate-100 antialiased">

  <!-- Xoa lich su chat cu khi reload trang, dam bao moi phien la cuoc tro chuyen moi -->
  <script>
    (function () {
      var keysToRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && (
          key.startsWith('bp/') ||
          key.startsWith('botpress') ||
          key.includes('conversation') ||
          key.includes('webchat') ||
          key.includes('bpcontent')
        )) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(function (key) { localStorage.removeItem(key); });
    })();
  </script>
  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/07/14/16/20260714161759-MUUBSMOY.js" defer></script>
